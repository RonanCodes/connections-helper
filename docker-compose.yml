services:
  connections-helper:
    build: .
    image: ghcr.io/ronancodes/connections-helper:latest
    container_name: connections-helper
    restart: unless-stopped
    ports:
      - "3006:3006"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3006
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3006/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
