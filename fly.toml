# fly.toml app configuration file generated for connections-helper on 2026-04-18T22:25:30+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'connections-helper'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3006'

[[mounts]]
  source = 'connections_data'
  destination = '/app/data'

[http_service]
  internal_port = 3006
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/stats'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
