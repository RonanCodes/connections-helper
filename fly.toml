app = "connections-helper"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3006"

[[mounts]]
  source = "connections_data"
  destination = "/app/data"

[http_service]
  internal_port = 3006
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/stats"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
